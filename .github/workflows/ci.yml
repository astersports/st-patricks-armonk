name: CI

# Runs the same gates we run locally — typecheck, tests, production build —
# on every PR to main and on pushes to main. This is the "green CI" the repo
# workflow refers to for auto-merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: check · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # @aster/weather is a cross-repo dependency (github:astersports/aster-weather).
      # pnpm resolves it to a codeload tarball, so we must supply a token that has
      # Contents: Read on astersports/aster-weather.
      # Prefer the ASTER_WEATHER_TOKEN secret (a fine-grained PAT scoped to that
      # repo); fall back to the built-in GITHUB_TOKEN, which works when both repos
      # are in the same org and the org allows cross-repo token access.
      - name: Authenticate the private @aster/weather dependency
        env:
          ASTER_WEATHER_TOKEN: ${{ secrets.ASTER_WEATHER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOKEN="${ASTER_WEATHER_TOKEN:-${GITHUB_TOKEN}}"
          if [ -z "${TOKEN}" ]; then
            echo "::warning::Neither ASTER_WEATHER_TOKEN nor GITHUB_TOKEN is available — install may fail for the @aster/weather dependency."
          fi
          # Auth the codeload tarball fetch pnpm uses for the github: dependency.
          {
            echo "//codeload.github.com/:_authToken=${TOKEN}"
            echo "//github.com/:_authToken=${TOKEN}"
          } >> "$HOME/.npmrc"
          # ...and any git-clone fallback path npm/pnpm may take.
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
