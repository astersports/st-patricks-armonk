name: CI

# Runs the same gates we run locally — typecheck, tests, production build —
# on every PR to main and on pushes to main. This is the "green CI" the repo
# workflow refers to for auto-merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: check · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # @aster/weather is a PRIVATE cross-repo dependency
      # (github:astersports/aster-weather), which pnpm resolves to a codeload
      # tarball. The job's default GITHUB_TOKEN is scoped to THIS repo only and
      # cannot read another repo, so CI needs a token with Contents: Read on
      # astersports/aster-weather. Add a repository or organization Actions
      # secret named ASTER_WEATHER_TOKEN (a fine-grained PAT or a GitHub App
      # token). Until that secret exists, install fails here with a clear error.
      - name: Authenticate the private @aster/weather dependency
        env:
          ASTER_WEATHER_TOKEN: ${{ secrets.ASTER_WEATHER_TOKEN }}
        run: |
          if [ -z "${ASTER_WEATHER_TOKEN}" ]; then
            echo "::error::Missing secret ASTER_WEATHER_TOKEN — required to install the private @aster/weather dependency (needs Contents: Read on astersports/aster-weather). Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Auth the codeload tarball fetch pnpm uses for the github: dependency.
          {
            echo "//codeload.github.com/:_authToken=${ASTER_WEATHER_TOKEN}"
            echo "//github.com/:_authToken=${ASTER_WEATHER_TOKEN}"
          } >> "$HOME/.npmrc"
          # ...and any git-clone fallback path npm/pnpm may take.
          git config --global url."https://x-access-token:${ASTER_WEATHER_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # Supply-chain faucet gate — mirrors astersports/aster-sports (Phase 0.0 /
  # PLAN_ON_TRUTH). Dependency changes that are EITHER a major-version bump OR
  # touch a money/child/auth-adjacent package (cookie, jose, @supabase/*, etc.)
  # must NOT auto-merge on green — they require a human owner, who releases the
  # PR with the `dep-review-approved` label. Minor/patch bumps to non-sensitive
  # deps pass and stay auto-mergeable. Gate by what the dependency TOUCHES, not
  # the version-jump size. PR-only. Needs no install (no @aster/weather token).
  # NOTE (owner): to BLOCK merge, mark this a REQUIRED status check in branch
  # protection — the job alone only reports.
  dependency-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Resolve base + head package.json + lockfile (P1-A — scan the resolved tree)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          LOCK=pnpm-lock.yaml
          git show "$BASE_SHA:package.json" > /tmp/base-package.json 2>/dev/null || echo '{}' > /tmp/base-package.json
          cp package.json /tmp/head-package.json
          git show "$BASE_SHA:$LOCK" > /tmp/base-lock 2>/dev/null || : > /tmp/base-lock
          cp "$LOCK" /tmp/head-lock 2>/dev/null || : > /tmp/head-lock
      - name: Gate major / money-child-auth dependency changes (resolved tree)
        env:
          BASE_PKG: /tmp/base-package.json
          HEAD_PKG: /tmp/head-package.json
          BASE_LOCK: /tmp/base-lock
          HEAD_LOCK: /tmp/head-lock
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: node scripts/dependency-gate.mjs
